# Netlify configuration for radicalrestandrenewal.com

# Force HTTPS — prevents duplicate content on http:// vs https://
[[redirects]]
  from = "http://radicalrestandrenewal.com/*"
  to   = "https://radicalrestandrenewal.com/:splat"
  status = 301
  force  = true

# Long-cache headers for static assets (images, fonts, CSS)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers (also minor SEO/trust signals)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
